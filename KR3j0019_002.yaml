  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0019_WYG_002-1a, image: WYG0849/WYG0849-0285c.png}
body:
  text: 芻言卷中宋崔敦禮撰尊義者尊君親仁者親親夫人致身於其君而忠衰於諫諍尊君而不知義者也竭力於其親而孝衰於諭道親親而不知仁者也義以事君而義尊乎君斯尊君之至矣仁以親親而仁親乎父斯親親之至矣知此理者為人臣則死於義為人子則死於仁儲粟以備飢儲藥以防癘仁之至也欲救飢也幸歳之荒欲起死也幸人之殃則不仁之甚矣是故濟危則知仁排難則知義國亂則知忠六親不和則知孝仁人不欲為仁欲為仁者不仁也義士不欲為義欲為義者不義也忠臣不欲為忠欲為忠者不忠也孝子不欲為孝欲為孝者不孝也譽人而無要譽毁人而無反毁斯毁譽之當也譽人而人亦譽之則是自譽矣毁人而人亦毁之則是自毁矣自譽仁之賊也自毁義之賊也甲氏乙氏耕甲氏連阡陌不力種終嵗不粒食乙氏無置錐盗人之田而耕之享千鍾二氏交相笑未知孰非也有昧昧而居者曰仁者有夭焉不仁者有考焉人何為哉有昭昭而行者曰得者吾巧也至者吾力也天何為哉是則甲氏之不力種昧昧之徒與乙氏之陷為盗昭昭之徒與鷦巧而危鵻拙而安案鵻疑作鳩巧不足則鷦脫其危矣拙不足則鵻失其安矣是故智不欲有餘愚不欲不足智不足者厭事者也守常者也畏行險者也愚不足者無能而強為有能者也無用而強為有用者也無知而強為有知者也智不足可以免過愚不足乃至於失寧振貧不已至於盗粟逐狂不已至於倮走讀律不已至於竊簡學禮不已至於蹲踞是故君子之為善貴乎有止也為仁止於愛為義止於宜為禮止於敬為智止於知愛而不止不仁矣宜而不止不義矣敬而不止不禮矣知而不止不智矣聖人之道猶平川坦途乎由仁而仁由義而義惟所行焉初無風波之虞荆棘之患也貪者行險姦者由徑惑者多岐愚者索途哀哉灼龜文揲蓍䇿可以知来物其必然矣誠則應不誠則遺誠則中不誠則否是則龜不自靈因誠而靈者也蓍不自神因誠而神者也心茍誠焉目視耳聼推度考察無所不騐是故季札卜以樂趙孟卜以詩㐮仲歸父卜以言沈尹戍卜以政孔成子卜以禮其應也如響斯誠卜之道與草木之長不見其有予而日脩䃺礛之砥不見其所奪而日薄為善之益無助長之功為不善之損無傷手之迹謂其為無所予而不為也謂其為無所奪而不畏也哀哉敬者不觀其羣觀其獨也懼者不觀其危觀其安也勇者不觀其躁觀其静也勤者不觀其始觀其終也羣焉而敬者其文也危焉而懼者其勢也躁焉而勇者其暴也始焉而勤者其銳也觀者其審諸君仁臣忠父慈子孝兄友弟悌此六者天下之大順也善仁者不泄全其忠也善慈者不狎全其孝也善友者不暱全其悌也君子之道何如則可以常矣曰去四過取四本則可以常矣何謂四過曰勇過於仁謂之暴言過於行謂之妄譽過於實謂之妖材過於徳謂之姦四本曰本仁以見勇本行以出言本實以居譽本徳以用材勇懦非異力也愚智非異識也巧拙非異功也萬夫之氣有怯於一士之激千慮之計有劣於一慮之得百藝之能有粗於一技之習懦者能奮與勇者同力也愚者能慮與智者同識也拙者能勉與巧者同功也范氏之鍾有竊而逃者鎗然有聲懼人聞之也自掩其耳人有行小人之行而謂人之不見也道小人之言而謂人之不聞也姦者文其辭詐者匿其迹貪者退其容荏者厲其色以已之昧昧謂人之惑惑吁亦掩耳之徒與諫之名有五假物而諭之謂諷因其善而導之之謂順有犯無隐之謂直正議直陳抵忌諱不避之謂指忘軀狥忠不顧鼎鑊之謂戇此五者諫之大要也類而求之則亦多術矣縫闕失者其辭微辯利害者其辭博責君之難者其辭髙拂其違者其辭矯憂國切者其辭危慮患豫者其辭逺介人之辭約質人之辭拙踈淺之人其辭狂疾人之佞者其辭警其言誇者其志卑其言危者其心安䛕順之言其情險强而笑者其怒深黙者多明辯者多傾聽者其審諸福者禍之先也利者害之始也㤙者怨之媒也譽者毁之招也君子不要福故無禍矣不求利故無害矣不廣㤙故無怨矣不敢譽故無毁矣􅀈屼之山草木枯焉有一石之竒竒乎濁黒之溪泥淖汩焉有一勺之清清乎曰竒吾見一石矣未見其山也清吾見一勺矣未見其水也髙明秀麗山之全也汪洋澄深水之全也觀人者譬諸觀山及水如不全􅀈屼濁黒烏乎取莫易於為善莫難於為不善敬君臣篤父子睦兄弟信朋友善也至易者也駕浮偽飾姦詭造巇嶮作機巧不善也至難者也難則勞易則佚難則憂易則樂君子者佚樂而為君子者也小人者憂勞而成小人者也舍易而難舍佚而勞舍樂而憂愚矣哉或問大愚曰小智大拙曰小巧然則智愚乎曰小智所以愚也巧拙乎曰小巧所以拙也途之里有限也疲者賖焉壮者邇焉夜之刻有度也愁者脩焉勞者短焉是故一人也毁譽半焉一事也可否並焉一物也羙惡萃焉一言也疑信殊焉力不同者不勝其異勢也心不同者不勝其異見也噫是果有異乎哉好賢者輕譽好仁者輕予好義者輕許輕譽者失實輕予者失㤙輕許者失言君子重於譽若重於毁斯得賢矣重於予若重於取斯得仁矣重於許若重於否斯得義矣牛之寝齕蚊蝱撓之揺耳皷尾以揮其去有甘口䑕者食其角貫心徹骨而不知非蚊蝱之噆毒於䑕之牙也以其口甘故雖齧盡而不痛也是故睚眦者不足慮悲歌之怨可憂也撫劒者不足畏含笑之忿可懼也謗詈者不足虞嚬蹙之誹可防也王陽不敢乘險将以為孝也故甘於不忠不忠之謂姦周處辭親事君将以為忠也故甘於不孝不孝之謂逆楊穆知其弟終敗與之别族将以為知也故甘於不友不友之謂賊羊續閉郡舍不納其妻将以為亷也故甘於不義不義之謂忍姦逆賊忍惡之大者也有是四惡而曰吾為善吾不信也渉川者有風波之虞行徑者有荆棘之患遭其患者未起繼其踵者不已利於川者玩於川便其徑者樂於徑也然則風波者以為平陸乎荆棘者以為坦途乎有騎於途者嵌巇屹嵲岌乎其若墜也終日行之不見有踶齧之變康荘平陸緩轡而周旋若足以逸矣忽焉弛銜堕策顛覆而莫之救吁險途易於危途也哉君子施亦仁不施亦仁小人施亦不仁不施亦不仁君子施則和而理不施則靜而敬施則文而通不施則約而修小人施則矜而倨不施則怨而險施則慢而暴不施則挫而懾君子者喻於仁者也小人者喻於不仁者也或問君子之道有屈信乎曰信也焉得屈曰孔孟之窮荀况之廢揚雄之貧王通之居汾韓愈之投荒惡乎信曰其位則屈其道則信請問道曰夫子信於六經軻信於七篇况信於新書案新書乃賈誼所作此云荀况疑誤雄信於法言太元通信於中說愈信於原道論佛骨表雖萬世不冺也其信也孰禦焉君子柔順者同物者也剛強者立已者也是人者樂善者也非人者疾惡者也言已之羙者自信者也小人柔順者諂䛕者也剛強者驕暴者也是人者比周者也非人者讒毁者也言已之羙者夸誕者也心乎君子一於君子矣心乎小人一於小人矣是君子小人之明分也再實之木根必傷掘藏之家必有殃非其利者勿有也非其事者勿就也非其功者勿居也無故而有顯名勿受也有人之利者害就人之事者敗居人之功者危受人之顯名者辱此四者不祥之大者也守義者以身守身者以義守義而不以身奪其義矣守身而不以義辱其身矣奪其義者道之賊辱其身者世之僇也古之隱也将以為止也今之隱也將以為仕也古之儉也将以為亷也今之儉也将以為貪也古之禮也将以為遜也今之禮也将以為争也樂者其形和怒者其形剛懼者其形柔憂者其形蹙心之所變形之所從也是故寵辱重矣正色化為婉媚勢利勝矣彊項化為傴僂忌諱嚴矣利口化為喑呃猜防深矣智慧化為狂愚心無所不變形無所不化吁心化之漸其得不畏哉知我而是之者吾是矣知我而非之者吾非矣不知而是之雖羙吾媿不知而非之雖惡吾省是故聞譽而說謂之躁聞毁而怒謂之暴因危而言敬因阨而言分因不知而言黙因不好而言亷君子不為也射者端釣者恭事使之然耳登髙者望臨深者窺勢使之然耳才而無徳謂之姦勇而無徳謂之暴辯而無徳謂之誕智而無徳謂之譎才而徳者賢也勇而徳者義也辯而徳者信也智而徳者哲也至恭不勞至哀不作至儉不陋便辟僂傴不足以為恭也長號流涕不足以為哀也弊衣糲食不足以為儉也山生金自刻也木生蠧自食也敗於功者貪功者也死於利者窮利者也罹於法者深法者也堕於謀者好謀者也是故菑人者自菑而已賊人者自賊而已君子者功不欲盈利不欲精法不欲宻謀不欲傾以智者之事行海之鰂其出遊也吐墨以芘其身自以為智矣漁人將設羅非其墨不得也是故設機以拒禍者禍之標的也任數以防亂者亂之藪澤也扄鐍固而盗賊至焉權量作而鬬爭興焉革堅而兵刃利焉城成而衝栰生焉案栰疑作梯智不可以勝姦也勇不可以禦暴也辯不可以釋誹也險不可以避患也芻言卷中
