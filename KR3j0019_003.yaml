body:
  text: 芻言卷下宋崔敦禮撰蠧魚之害於書拂而除之惟恐不至也有笑而言曰書奚惡於蠧哉夫九師易之蠧也二戴禮之蠧也三𫝊者春秋之蠧也孔氏劉氏者書之蠧也毛韓齊魯者詩之蠧也蟲魚之蠧蠧其書者也諸子百家之蠧蠧其道者也蠧其書者編簡殘闕蠧其道者生人喋血載哀者聞歌聲而泣載樂者聞哭聲而笑歌非可哀也哭非可樂也載使之然也是故喜怒無常心好惡無定形載於譽者至惡有所喜載於讒者至善有所怒載於愛者至醜有所好載於忌者至美有所惡大人者虛其中實其外含其光徹其昧是之謂去載聖人之文其道全學者之文其義全材士之文其詞全道全者人化之義全者人信之詞全者人悅之是故修詞而可說者義之末也明義以求信者道之衰也聖人者其猶天地乎天之道粲為日月星辰而四時行焉地之道陳為山川邱陵而百物生焉聖人之文道化焉而已矣魚無耳而能聼蟬無口而能鳴蛇無足而能行兔絲無根而能生其能者天其無者人其能者性其無者形逹此理者肢體可以墮形骸可以忘目可不視而見耳可不聼而聰口可不言而信行可不為而功工求其工學者亦求其工乎曰雕鎪剞劂木之病也纎織組麗絲之蠧也穿鑿破碎道術之衰也鈎棘排偶文章之弊也工乎工乎吾見拙者笑之矣仁木也禮火也信土也義金也智水也仁以長人故生禮禮以定分故生信信以立志故生義義以逹宜故生智此五行相生之性也仁過則柔義克之義過則暴禮克之禮過則煩智克之智過則詐信克之此五行相克之理也相生以因之相克以成之斯變通之道與持寶以求市者不欲人誇之擇善以求友者不欲人譽之薄我貨者欲與我市者也訾我行者欲與我友者也是故君子因譽而情踈因諍而友密諂諛我者害己之賊也稱述我者行路之人也詆切我者金石之至交也見麋鹿者援弓而射之幸而中焉失聲而喜之逢螻蟻者迂足而活之誤而傷焉失聲而痛之心非仁於螻蟻忍於麋鹿也欲勝則為忍欲去則為仁也是故欲勝者父子可使相食兄弟可使相賊欲去者天地可以為家萬物可以為一賢者吾敬之不賢者吾亦敬之善者吾親之不善者吾亦親之有賢不敬是聾瞽也有不賢不敬是狎虎也有善不親是廢繩而揉曲也有不善不親是舍石而攻玉也賢者吾敬之以為法不賢者吾敬之以為戒善者親之以治吾不善不善者親之以成吾善此君子之學也仁者人也義者冝也禮者體也智者至也信者信也仁而不合乎人曰僞義而不逹其冝曰固禮而不知其體曰忒智而不止其至曰惑信而不得其信曰塞宋襄公行仁而敗非夫仁而能敗人也僞也徐偃王為義而滅非夫義而能滅人也固也魯哀公治禮而削非夫禮而能削人也忒也萇洪以智困非夫智而能困人也惑也尾生以信殞非夫信而能殞人也塞也相入者相賊不相入者相息膠漆之投天下莫解焉而同歸於物冰炭之反天下莫合焉而各全其天是故情壞於所溺心壞於所雜君子之性惡其有入也忿者仁之賊也欲者義之螣也逸者智之毒也懼者勇之仇也是故多忿害物多欲害已多逸害性多懼害志白並於五色而五色在白之中甘並於五味而五味在甘之中宫並於五聲而五聲在宫之中仁並於五常而五常在仁之中是故五色之變不勝其觀也白立而五色形矣五味之調不勝其嘗也甘立而五味停矣五聲之和不勝其聼也宫立而五聲成矣五常之道不勝其用也仁立而五常具矣無失無得是謂天則不始不已是謂天理無醜無好是謂天道不亟不稽是謂天時暗其天道滅其天理悖其天時以違天則是之謂凶德聖人遵天之道由天之理與天為期以循天則是之謂天德至強非甲兵也至貴非軒冕也至富非金玉也至夀非千嵗也克己自勝強之至矣清心飬性貴之至矣安分止足富之至矣通晝夜之道知死生之說壽之至矣里之巫曰羞酌尋常歌迎舞將祈疾者健起祈嵗者豐穰羊豕鮮肥金樽玉巵祈疾得亟祈歲得飢人有難之者曰儉以嗇寡欲而虛一必吉侈而豐欲多而實中必凶吁巫之言其幾於道者乎不過勝母所以立孝也不入朝歌所以立儉也不飲盜泉所以立亷也名乖而無損於實不得不懼事非而無傷於德不得不去糟邱之荒象箸之習也炮烙之慘熱升之積也殉良之哀偶人之弊也是故防有者必立於無救末者必立於初橘柚之朽或為蝴蝶韝蒼䄡黑其文美也倚薄風露其志潔也篁端蕙隙其處髙也須㬰觸物而膠之枯為塵矣天地大橘柚也人物大羽化也名位大蕙篁也榮而瘁者能幾須㬰之頃哉鋤者日却愈却而墾愈廣織者日進愈進而帛愈長君子者為道日損若鋤之却則道得矣為德日益若織之進則德積矣為道而不能損是進而鋤也為德而不能益是却而織也博愛之謂仁不疑之謂信無所不知之謂智此不易之理也君子行之則不膠於迹矣愛之仁也有所惡亦仁也信之信也有所疑亦信也知之智也有不知亦智也目明而不妄視耳聰而不妄聼心慧而不妄慮此精神之舍也精全而神全神全則氣全一夫而能奪三軍非戈矛之利精神勝之也一賢而能折千里非詐謀之用精神制之也是故精誠之至者石可使之决泉可使之躍日可使之却况於人乎况於事倫乎愚者之道有四庶人之愚不與焉有逹人之愚有哲人之愚有信人之愚有直人之愚顔子者逹人之愚者也髙柴者信人之愚者也寧武子者哲人之愚者也朝錯者直人之愚者也外視者蔽內視者明外聼者惑內聼者聰明莫明於日也視之者昏響莫響於雷也聼之者聾外視無至明也外聼無至聰也大人者還觀於無反聼於虛若水之清明從內生若谷之虗響從內興所以為視聼之精窮里之社有扣盆拊瓴和而歌者自以為樂矣一旦使之擊建鼓撞巨鍾仍仍然知盆瓴之足羞也穿鑿以為深雕琢以為功誦說以為精謂學之至也君子視之叩盆拊瓴之徒耳是故不聞聖人之道不知穿鑿之粗也不觀聖人之文不知雕琢之陋也不得聖人之忘言不知誦說之無益也江之蟹初穴於沮洳秋冬之交則大出指海而趨焉漁者緯蕭而留之越軼而去不逹於江不至於海不止也是故曲學者沮洳也大道者江海也厭沮洳而决江海人之所同也不塞於異端不障於邪說若蟹之勇能越軼而至於海者鮮矣芻言卷下
