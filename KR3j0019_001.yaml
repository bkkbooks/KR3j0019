body:
  text: 芻言卷上宋崔敦禮撰敦禮居山間有書三卷上卷言政中卷言行下卷言學凡三百有五篇言語簡朴不知緣飾其芻蕘之愚乎乃命曰芻言三皇之治使民心朴故結繩之政可行也五帝之治使民心一故垂裳之化可成也三王之治使民心親故年世之長可期也三皇者粹乎道者也五帝者粹乎德者也三王者粹乎仁義者也駮於霸雜於漢虛誕於晉浮靡於隋其使民可知矣得民之勞者昌得民之憂者康得民之死者強不有逸之孰為勞之不有樂之孰為憂之不有生之孰為死之山雲草莾水雲魚鱗旱暵之雲煙火涔渚之雲水波出於此者形於彼也至於政之應亦然善政之俗魚鳶暴政之俗湯火寬政之俗舒長急政之俗短促貪政之俗焦熬惠政之俗繁惑案惑字有訛疑當作盛公政之俗清眀偏政之俗暗曲自然之象也君子觀其俗則其政可知矣受光於隙照一隅受光於牖照北壁受光於庭戶照滿室受光於天下照四方無遺物君子聼言亦眀之所入與邇聼者隙中之細者也偏聼者一牖之窺者也正聼者户庭之嚮也建善旌立針木百工諫庶人謗議天下之照也所受小則所照者狹所受大則所照者博不得不擇矣天地不可課其生也日月不可課其明也雨露不可課其潤也鬼神不可課其靈也聖人之道不可課其功也如日書焉月考焉聖人必不得於最矣野之氓有設祠以為敬者其象猛椎牛擊豕犬雞魚菽之薦日至焉吏以竭氓力而奉無名之土木可廢也殊不知鬼猛其形享吾民之酒牲吏猛其氣食吾民之膏髓酒牲可繼也膏髓不可復也逐吏之猛吾謂急於逐鬼之猛焉醫之活人方也殺人亦方也人君治天下法也亂天下亦法也方能治病不能盡天下之病遇病而不通於方殺人矣法能制變不能盡天下之變遇變而不通於法亂天下矣是故上醫無傳方非無良方也憂用方者也聖人無定法非無善法也憂用法者也九人履其一跣焉則跣者恥九人跣其一履焉則履者不能為俗赭衣墨服舜之刑寬矣而民愈避斷支體殘肌膚秦之法嚴矣而民愈犯民非畏寬而易嚴也法寬則刑者少刑者少則民為恥矣法嚴則犯者多犯者多則民為玩矣舜之民十人而九履者也秦之民十人而九跣者也天下無常治非無常治也無常時也孰為時曰在國其次在士其次在民善善而惡惡進賢而退不肖賞一出而天下以為勸罰一出而天下以為沮時在國者矣周道衰諸侯之論屈於遊談漢治廢公卿之望輕於布衣時在士者矣一夫倒戈天下化商而為周阡陌首難天下變秦而成漢時在民者矣在國立治之本也在士扶危之道也在民國非其國矣危國若實安國若虛盛世若不足衰世若有餘危國若實府庫溢也安國若虛損在上也盛世若不足民儉而重本也衰世若有餘俗偷而縱欲也節人食者食愈美戒人飲者飲愈旨禁民之欲者錮其欲者也約民之樂者重其樂者也君子不禁其欲而禁其所以欲不約其樂而約其所以樂上好利則下多盜矣上好勇則下多殺矣上好矜則下多鬭矣上好辨則下多誕矣上好智術則下多詐矣本在上不在下倡在君不在民老子曰我無欲而民自朴我好靜而民自正觀民之貧富善惡有證矣府庫溢則民貧爵豫輕則民貧文物盛則民貧技巧衆則民貧禮法不立則民貧無教則民惡無信則民惡政暴則民惡吏姦則民惡征斂困則民惡君民之間至密也不誠則踈至易也不誠則迂行者思於途居者夢於牀慈母吟於巷適子懷於荆誠心守仁則民親於彼誠心存義則民尊於彼謂民為踈者私心間之也謂民為迂者欺心蔽之也尊卑殊貴賤異民至卑賤而不敢爭者也尊逸而卑勞貴榮而賤辱民至勞辱而不敢怒者也不敢爭則欲之至矣不敢怒則怨之至矣怨欲在心如物之有毒如蓬之藏火亂之所蓄與是故聖人之治不曰不爭不使敢欲不曰不怒不使可怨祿不以功爵不以德啓民之欲者也法禁煩徭賦重賈民之怨者也禾熟則穫果熟則剝禾未熟而登場穡者播之矣果未熟而登盤食者吐之矣是故治之固者政之熟者也俗之醇者化之熟者也功之成者慮之熟者也名之歸者德之熟者也政未熟於凝一急求治者必亂也化未熟於陶染急變俗者必駭也慮未熟於事幾急圖功者必沮也德未熟於安行急知名者必辱也自私者民公之自公者民私之公之者踈私之者親踈之者亡親之者昌財聚於辛國并於秦私其已者也湯之禱禹之胼胝公其心者也周之時其節民有制乎不蓄者祭無牲不耕者祭無盛不植者無椁不蠶者不帛不績者不衰故無其業而為其禮則僣後世反此不耕者美食耕者不得甘其喉不蠶者鮮衣蠶者不得縫其膚田廬不知薦陳之品衾椁之具而墮遊末作喪祭侈於公侯吁何憚而不為末哉不放古以制之生人之衣食或幾乎絶矣䄍于郊也有司以告曰旱于某潦于某蝗于某厲于某則黜其方之神不以祭斯唐虞黜陟之意也四方之吏有殘暴貪刻使其民焦熬湯火旱之烈者也流亡破蕩潦之大者也椎剝肌髓蝗之毒者也户口凋耗厲之酷者也宜放䄍之法曰旱于某潦于某蝗于某厲于某則黜其方之吏不以赦斯得矣善治天下有爭治無爭亂爭治速治也爭亂速亂也朝者爭名市者爭利貴者爭權賤者爭力亂矣名爭求晦利爭受薄位爭處卑事爭就勞治矣人日爭於亂之中而不知其亂也聖人必抑之人日爭於治之中而不知其治也聖人必激之爵豫公名分辨之謂抑晦斯光薄斯豐卑斯尊勞斯安之謂激信在言前者同言而民信之誠在令外者同令而民從之賞而不誠不勸也刑而不誠不戒也政而不誠不正也教而不誠不化也古之愛民也為為我後之愛民者為為民古之為民也為已憂後之為民者為已德沮邪曰忠毁忠曰讒忠則逆耳讒則遜志其始判然也逆耳者疑訐斯去之矣遜志者疑善斯進之矣進之去之而禍未見讒日進焉則以習於前而不疑也讒習於進愈不靳忠習於去愈不懼久之遜志者當進逆耳者當去云耳吳之嚭秦之髙楚之尚無極習而不知也樂之用神矣乎無故而使人喜雖千金容不改無故而使人怒雖白刃色不變動以金石文以絲竹無繫於休戚也約之則民憂易之則民樂厲之則民剛徑之則民肅吁其神乎先王有政以正民刑以齊民禮以節民可也無樂以行焉其或病在骨髓雖有針灸湯藥將安用之上好土木則山谷井陌矣上好金珠則川澤鼎鑊矣上好珍禽則原野狴犴矣上好文繡則機杼桎梏矣上取其絲下致其綸上取其綸下致其綍是故古之君有好猿而林殘求珠而魚殫亦趨好之過與天因春而生非作好也因秋而殺非作惡也其生之也無感其殺之也無憾眀主之治善者有賞而國無私焉天之慶賞也惡者有誅而君無與焉天之誅戮也賞者不昵德誅者不挾怨天之妙萬物也夫是之謂天政媒妁譽人非不美也而人莫之德取庸而強之飯非不勤也而人莫之惠有所利而名仁者非仁也有所要而稱義者非義也慈父之愛子不可移於性非為報者也聖王之飬民不可改於心非求用者也是故至仁不為恩至義不為功至仁所施不知親而親之至義所加不知尊而尊之非弓矢無以射非法令無以國人有憂射之不中者曰是弓矢之過也調弓矯矢而去愈逺矣憂國之不治者曰是法令之失也變法更令而亂愈甚矣是故弓矢中之具也弓矢非所以中也法令治之具也法令非所以治也思治民不可以不裕民思裕民不可以不節民思節民不可以不辨民思辨民不可以不定民農定於耕則餘粟商定於貨則餘財百工定於藝則餘巧士大夫定於職則餘力有以變常而亂者矣未有守常而不治者也有以亂分而危者矣未有分定而不寧者也善為國者榮其榮辱其辱不善為國者榮其辱辱其榮五章之服君子者寵焉榮其榮也赭黑之衣小人者耻焉辱其辱也漢誅濫於名節貫械腰斧質請罪者相屬榮其辱矣唐爵輕於胥皂青朱金紫雜沓而無别辱其榮者矣木之華者養其落者也齒之盛者養其衰者也國之治者養其亂者也培根而去蠧木之壽矣清心而寡欲人之夀矣循道而救弊國之夀矣為其所好輟其所惡行其所樂戒其所懼有心所同然也堯舜者樂於仁者也桀紂者樂於暴者也堯舜惡於仁不為仁矣桀紂惡於暴不為暴矣是故治國者樂其所以存亂國者樂其所以亡避堯而洗耳非舜而投淵士之亢節也聖人不以責人行推處妖祥逹視千里人之極智也聖人不以責人術山淵平天地並世之強辨也聖人不以責人言連機運開隂閉幻錯工之竒巧也聖人不以責人藝亢節者不可為民化也極智者不可為民修也強辨者不可為民聼也竒巧者不可為民業也跂之而易及也慮之而易知也言之而易行也為之而易能也夫是之謂善俗能者有以位為事勇者有以位為暴仁者有以位為患位為事則下無寧矣位為暴則下無全矣位為患則下忘分矣是故用人之能貴乎靜用人之勇貴乎緩用人之仁貴乎尊倕作弓夷牟作矢案夷牟徐堅初學記引世本作牟夷然吕覽及許愼説文亦作夷牟今仍從原本書之而后羿名於射奚仲作車相士作乘馬而造父名於御為之者不能用用之者不必為也智者有謀用之者明材者有長用之者能自智者無明也自材者無能也是故藝之至器用出於人君之至材智出於人輜軿青紫所以飾喜也斧質刀鋸所以飾怒也謂賞必喜乎欲殺之怨有不靳於封侯賞非其喜矣謂罰必怒乎涕泣之哀有不貸於誅殛罰非其怒矣賞不以喜賞之當乎喜罰不以怒罰之當乎怒是故聖人在上以賞罰立喜怒不敢以喜怒立賞罰汙樽抔飲人茍利之雖有盛禮聖人不陳也簣桴土鼓人茍樂之雖有備樂聖人不作也橧巢營窟人茍安之雖有棟宇聖人不為也好至治者招大亂者也務窮利者致大害者也無亂而已聖人不要其極也無害而已聖人不僥其功也民之禁十有二商之禁十有二賈之禁十有二工之禁十有二古也所以抑浮靡通貨殖便用物厚衣食也後之禁民者有矣山澤江海有禁也􅐭鐵酒茗有禁也布帛絲枲有禁也關市河梁有禁也古之禁禁其害民者矣後之禁禁其飬民者矣古之民也足後之民也困宜哉名實之所在人主不得而忽矣德浮於名者國之寶也譽稱其實者國之器也名多而有餘事舉而無當者國之妖也有國者寶其寶器其器鋤其妖而天下治矣客有一昔於驛案一昔一夜也列子昔昔注訓為夜夜驛吏伏謁聼役若久所事者客疑而詰之吏曰今之仕者皆驛也吏何擇焉且百里之地者縣令之驛也千里之境者郡守之驛也連城一道者部刺史之驛也席未暖而移突未黔而歸有能不及用有智不及施仕者何為哉驛者何為哉䄍為鼠迎貓為豕迎虎迎貓可也迎虎可乎豕來食禾虎來食人矣農者哂曰食人可逃也食禾不可活也然則食禾者猛於虎乎鉏耰未乾喉不得甘新絲出盎膚不得縫未嘗稼穡者榖滿倉也未嘗桑蠶者絲滿囊也噫食其禾者不少矣芻言卷上
