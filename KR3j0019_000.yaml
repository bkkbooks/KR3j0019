body:
  text: 提要芻言雜家類一雜學之屬臣等謹案芻言三卷宋崔敦禮撰敦禮家本河北南渡後與弟敦詩同登紹興進士官至諸王宫大小學教授愛溧陽山水買田築室居焉是編凡分三卷上卷言政中卷言行下卷言學其造文皆規橅揚雄王通頗追步古之儒家無語録鄙俚之集卷首以道德仁義分析差等中又有諸經傳注為蠧道之書其旨頗雜于黃老未為粹然儒者之言至其間指切事理于人情物態抉摘隱微多中窽要雜家者流七略著録固不妨並存其説備採擇焉則亦有不可盡廢者爾樂菴語録雜家類一雜學之屬臣等謹案樂菴語録五卷宋龔昱撰昱字立道崑山人從學於李衡録衡平日講學之語為此書樂菴者衡所居也衡為學以論語為本嘗有得於洛人趙孝孫之説孝孫之父受業伊川故衡亦淵源程氏所著周易義海撮要已别著録是編闡明理學間論詩文亦有涉及二氏者如因緣地獄諸説未能粹然無疵而超悟處自非淺人所及卷末載衡本傳及遺事數則又有吳仁傑後序王藺孫僑遊洚周必大范成大王遂劉煒諸人跋語甚詳觀其抗章論事不避權貴臨歿從容篤於任恤真能脫然於富貴生死之際以之印證所言庶幾躬行實踐非空談性命者可比仁傑後序云吾友龔君立道篤意於學從先生遊者六年聞微言要指必書於䇿亦可謂不忘其師者矣明方鵬崑山人物志稱昱蔚有文學安貧樂道鄉人謂之龔山長所居曰棲間堂陸遊劉過皆為賦詩云乾隆四十七年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:12ec22d453325f773eea0b63bea7a6a11866143c745d49427c9e6d393f6b1117
